name: secret-scan
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions: write-all

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Run 2ms
        run: |
          docker run --user "$(id -u):$(id -g)" --rm -v "$PWD":/repo checkmarx/2ms \
            git /repo --stdout-format sarif \
            --report-path /repo/artifacts/2ms_raw.sarif \
            --ignore-on-exit results

      # Fixes the CodeQL invalid URI colon error by stripping the "git show <hash>:" prefix
      - name: Sanitize SARIF for CodeQL
        run: |
          
            jq '
          walk(
            if type == "object" and has("uri") and (.uri | test("^git show [a-f0-9]+:")) then
          # 1. Extract the hash from the URI string
          (.uri | match("^git show ([a-f0-9]+):").captures[0].string) as $hash |
          
          # 2. Inject the hash into the properties block
          .properties = (.properties // {}) |
          .properties.commit = $hash |
          
          # 3. Clean the uri property
          .uri |= sub("^git show [a-f0-9]+:"; "")
          else
          . end
          )
          ' artifacts/2ms_raw.sarif > artifacts/2ms.sarif

      - name: show SARIF contents
        run: |
          cat artifacts/2ms.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: artifacts/2ms.sarif
